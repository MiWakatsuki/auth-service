services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-service-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
